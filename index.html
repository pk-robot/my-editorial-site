---
layout: default
title: Home
---

<h2 style="margin-bottom: 2rem; border-bottom: 2px solid #1a1a1a; padding-bottom: 0.5rem; font-size: 1.5rem; text-transform: uppercase; tracking: 0.05em;">Published Works & Biographies</h2>

<ul style="list-style: none;">
  {% for post in site.posts %}
    <li style="margin-bottom: 2.5rem;">
      <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; text-transform: uppercase; color: #7c5e43; font-weight:700; display:block;">{{ post.category }}</span>
      <h3 style="margin-bottom: 0.5rem; font-size: 1.6rem;"><a href="{{ post.url }}" style="color: #1a1a1a; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s;"><span class="title-hover" style="hover:border-bottom: 1px solid #1a1a1a;">{{ post.title }}</span></a></h3>
      <p style="font-size: 1.05rem; color: #555; line-height: 1.5;">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </li>
  {% endfor %}
</ul>
